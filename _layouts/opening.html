<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}?v={{ site.time | date: '%s' }}">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止滚动 */
            background-color: #040812; /* 深海底色 */
        }
    </style>
    {% if page.custom_css %}
        <link rel="stylesheet" href="{{ page.custom_css | relative_url }}">
    {% endif %}
</head>
<body class="opening-page-body opening-active">
    <main>
        {{ content }}
    </main>
</body>
</html>
