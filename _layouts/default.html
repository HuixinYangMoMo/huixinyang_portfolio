<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}?v={{ site.time | date: '%s' }}">
    {% if page.custom_css %}
        <link rel="stylesheet" href="{{ page.custom_css | relative_url }}">
    {% endif %}
</head>
<body{% if page.permalink == '/opening/' %} class="opening-page-body"{% endif %}>
    <nav class="nav">
        <div class="container nav-shell">
            <a class="brand-lockup" href="{{ '/' | relative_url }}">
                <strong>{{ site.title }}</strong>
                <span>{{ site.description }}</span>
            </a>
            <ul class="nav-list">
                {% for item in site.navigation %}
                <li class="nav-item">
                    <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container footer-shell">
            <div>
                <strong>{{ site.title }}</strong>
                <div>{{ site.description }}</div>
            </div>
            <div>
                <div>{{ site.social.email }}</div>
                <div>{{ site.social.phone }}</div>
            </div>
        </div>
    </footer>
</body>
</html>
