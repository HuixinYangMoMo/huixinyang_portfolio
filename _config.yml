title: 杨慧鑫
description: 广告美术 | 品牌视觉 | AIGC 视觉方向持续实践
baseurl: "/huixinyang_portfolio"
url: "https://huixinyangmomo.github.io"
lang: zh-CN
timezone: Asia/Shanghai
markdown: kramdown
exclude:
  - GITHUB_PAGES_HANDOFF.md
  - .bundle/
  - node_modules/
  - vendor/
  - package.json
  - package-lock.json
author:
  name: 杨慧鑫

# 资源路径设置
sass:
  style: compressed
  
# 静态文件设置
defaults:
  - scope:
      path: "assets"
    values:
      image: true
  - scope:
      path: "images"
    values:
      image: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 作品集设置
collections:
  works:
    output: true
    permalink: /:collection/:name/

excerpt_separator: "##"

# 导航菜单
navigation:
  - title: Work
    url: /
  - title: Process Deck
    url: /process-deck/
  - title: AIGC Visual Lab
    url: /works/aigc-lab-roadmap/

# 社交媒体链接
social:
  email: mojimo.cc@gmail.com
  phone: （+86）15800440416
  location: 上海
