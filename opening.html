<div class="opening-fullscreen" data-open-home role="button" tabindex="0" aria-label="进入首页">
    <h1 class="opening-title">杨慧鑫作品集开屏</h1>
    <canvas class="opening-canvas-fs" data-opening-canvas></canvas>

    <div class="opening-overlay-fs">
        <span class="opening-overlay__enter">Enter Portfolio</span>
    </div>
</div>

<style>
    .opening-fullscreen {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        cursor: pointer;
        background: radial-gradient(circle at 40% 60%, #091c2b 0%, #06111a 40%, #020409 100%);
        overflow: hidden;
    }
    /* 印刷噪点与暗角增强艺术感 */
    .opening-fullscreen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.8);
        mix-blend-mode: overlay;
        z-index: 5;
    }
    .opening-title {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }
    .opening-canvas-fs {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
    }
    .opening-overlay-fs {
        position: absolute;
        bottom: 40px;
        right: 40px;
        z-index: 10;
        pointer-events: none;
    }
    .opening-overlay-fs .opening-overlay__enter {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 16px;
        border-radius: 999px;
        backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.75rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        transition: all 0.3s ease;
    }
    .opening-fullscreen:hover .opening-overlay__enter {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const openingTrigger = document.querySelector('[data-open-home]');
    const enterHome = function() {
        window.location.href = "{{ '/' | relative_url }}?entered=1";
    };

    if (!openingTrigger) {
        return;
    }

    openingTrigger.addEventListener('click', enterHome);
    openingTrigger.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            enterHome();
        }
    });
});
</script>
<script>
window.__OPENING_ASSET_VERSION__ = "{{ site.time | date: '%s' }}";
</script>
<script type="module" src="{{ '/assets/js/opening-canvas.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
