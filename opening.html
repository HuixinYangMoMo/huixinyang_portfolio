title: Opening
permalink: /opening/

<div class="opening-fullscreen" data-open-home role="button" tabindex="0" aria-label="进入首页">
    <h1 class="opening-title">杨慧鑫作品集开屏</h1>
    <canvas class="opening-canvas-fs" data-opening-canvas></canvas>

    <div class="opening-overlay-fs">
        <span class="opening-overlay__enter">Enter Portfolio</span>
    </div>
</div>

<style>
    .opening-fullscreen {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        cursor: pointer;
        background-color: #ffffff;
        overflow: hidden;
    }
    .opening-fullscreen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        mix-blend-mode: multiply;
        z-index: 5;
    }
    .opening-title {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }
    .opening-canvas-fs {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
    }
    .opening-overlay-fs {
        position: absolute;
        bottom: 40px;
        right: 40px;
        z-index: 10;
        pointer-events: none;
    }
    .opening-overlay-fs .opening-overlay__enter {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 16px;
        border-radius: 4px;
        background: #fff;
        border: 2px solid #000;
        color: #000;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: all 0.2s ease;
        box-shadow: 4px 4px 0px #000;
    }
    .opening-fullscreen:hover .opening-overlay__enter {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px #000;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const openingTrigger = document.querySelector('[data-open-home]');
    const enterHome = function() {
        window.location.href = "{{ '/' | relative_url }}?entered=1";
    };

    if (!openingTrigger) {
        return;
    }

    openingTrigger.addEventListener('click', enterHome);
    openingTrigger.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            enterHome();
        }
    });
});
</script>
<script>
window.__OPENING_ASSET_VERSION__ = "{{ site.time | date: '%s' }}";
</script>
<script src="{{ '/assets/js/opening-canvas.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
